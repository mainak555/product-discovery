<!-- Sidebar project list (HTMX partial) -->
{% if projects %}
  <ul class="sidebar__list">
    {% for project in projects %}
      <li class="sidebar__item">
        <span class="sidebar__name"
              hx-get="{% url 'server:project_detail' project.project_id %}"
              hx-target="#main-content"
              hx-push-url="false">
          {{ project.project_name }}
        </span>
        <button class="sidebar__delete"
                hidden
                type="button"
                title="Delete {{ project.project_name }}"
                hx-post="{% url 'server:project_delete' project.project_id %}"
                hx-confirm="Delete '{{ project.project_name }}'? This cannot be undone."
                hx-target="closest li"
                hx-swap="outerHTML">
          &times;
        </button>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p class="sidebar__empty">No projects yet.</p>
{% endif %}
